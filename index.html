<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUरुप्प • Authentic Nepali Tea Experience</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="fab.css" />
    <link rel="stylesheet" href="modal.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f9f5f0, #f0e6dc);
        font-family: "Poppins", sans-serif;
      }
      .loading-container {
        text-align: center;
      }
      .loading-container h1 {
        font-size: 2.5rem;
        color: #c05a2c;
        margin-bottom: 1rem;
        font-family: "Playfair Display", serif;
      }
      .loading-container p {
        font-size: 1.1rem;
        color: #4e463e;
        animation: blink 1.5s infinite;
      }
      @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0.5; }
      }
    </style>
  </head>

  <body>
    <div class="loading-container">
      <h1>SUरुप्प</h1>
      <p>Taking you to our menu...</p>
    </div>

    <script>
      // Redirect to home.html - the main landing page
      window.location.href = 'home.html';
    </script>
  </body>
</html>
